[package]
name = "lain"
version = "0.1.0"
edition = "2021"
authors = ["Joel Johnson <johnson.joel.b@gmail.com>"]
license = "MIT"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
magnus = { version = "0.8.2" }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["json", "env-filter"] }
# Used only for `dup(2)` so the tracing subscriber can own an independent copy
# of a caller-supplied fd. Pinned (not `*`) to satisfy `cargo deny`'s wildcard
# ban.
libc = "0.2"
# Canonical's content-addressing hash. The one and only blake3 implementation
# in this project -- Ruby calls into this ext rather than carrying a second,
# separately-vendored copy of the algorithm.
blake3 = "1"
