[graph]
targets = []

[advisories]
version = 2
# RUSTSEC-2025-0057: fxhash is unmaintained -- an informational advisory only,
# no CVE. It is bm25's non-optional deterministic token hasher, and that
# determinism is exactly what the bench's byte-identical retrieval requires.
# Revisit if bm25 upstream migrates hashers or a real vulnerability lands.
ignore = ["RUSTSEC-2025-0057"]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "NCSA",
    "CC0-1.0",
    "Zlib",
    "MPL-2.0",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
