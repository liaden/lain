repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
        exclude: '\.rs$'
      - id: check-merge-conflict
      - id: check-yaml
      # A .patch file's whitespace is load-bearing: a blank context line in a diff is a
      # single trailing space, and stripping it corrupts the patch's applicability.
      - id: end-of-file-fixer
        exclude: '\.patch$'
      - id: trailing-whitespace
        exclude: '\.patch$'

  - repo: local
    hooks:
      - id: shellcheck
        name: shellcheck
        entry: shellcheck
        language: system
        types: [shell]
        exclude: '^\.envrc$'

      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt -- --check
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy --all-targets -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-test
        name: cargo test
        entry: cargo test
        language: system
        types: [rust]
        pass_filenames: false

      # cargo-deny refreshes its advisory-db by shelling out to `git -C <db> reset
      # --hard`. In a linked git worktree, `git commit` exports GIT_DIR/GIT_INDEX_FILE
      # into the hook environment, and those OVERRIDE `-C`, so the reset silently
      # discards *this* worktree's staged changes and the commit dies with "files were
      # modified by this hook". Strip them for this hook so the reset lands on the
      # advisory-db clone as intended. A no-op outside a worktree, where they are unset.
      - id: cargo-deny
        name: cargo deny
        entry: env -u GIT_DIR -u GIT_INDEX_FILE -u GIT_WORK_TREE cargo deny check
        language: system
        pass_filenames: false
        files: ^(Cargo\.(toml|lock)|deny\.toml)$

      - id: rubocop
        name: rubocop
        entry: bundle exec rubocop --force-exclusion
        language: system
        types: [ruby]

      # `rspec` cannot load `lain` until the Rust extension is compiled, so the
      # extension is rebuilt first. Touching either language re-runs the suite.
      - id: rspec
        name: rspec
        entry: bundle exec rake compile spec
        language: system
        types_or: [ruby, rust]
        pass_filenames: false
