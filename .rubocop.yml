AllCops:
  TargetRubyVersion: 3.2
  NewCops: enable
  SuggestExtensions: false

Style/StringLiterals:
  EnforcedStyle: double_quotes

Style/StringLiteralsInInterpolation:
  EnforcedStyle: double_quotes

# RSpec describe/context blocks are legitimately long; the cop measures the DSL,
# not complexity. `spec/support` holds shared example groups, which are the same
# DSL wearing a different name.
Metrics/BlockLength:
  Exclude:
    - "spec/**/*_spec.rb"
    - "spec/support/**/*.rb"
    - "*.gemspec"

Layout/LineLength:
  Max: 120

# Keyword arguments are self-describing at the call site, so they do not carry
# the legibility cost that motivates this cop for positional parameters. Value
# objects with many named fields are exactly the intended shape here.
Metrics/ParameterLists:
  CountKeywordArgs: false

# The CLI assembly classes (Wiring, ChatLaunch) legitimately run long: their
# length is many small, named wire-ups of ONE responsibility -- assembling a
# chat's collaborators -- not a hidden second concern the cop would otherwise
# flag. Domain and value objects stay well under, so a long one there still
# signals a missing object. A modest ceiling keeps that signal while not
# forcing an artificial split of a cohesive assembler.
Metrics/ClassLength:
  Max: 110

# In the middleware idiom the block IS the downstream app, and `&app` says so.
# Anonymous `&` forwarding would save six characters and cost the reader the one
# name that explains the shape.
Naming/BlockForwarding:
  EnforcedStyle: explicit

# Joel's `{ effect:, context: }` in tool_runner.rb is the style we want everywhere a
# hash value merely repeats its key -- `always` is the only shorthand setting that
# actually enforces it (`either`/`either_consistent` tolerate the old form). Vendored
# HTTP code keeps upstream shape, so it is excluded from this cop specifically.
Style/HashSyntax:
  EnforcedShorthandSyntax: always
  Exclude:
    - "lib/lain/provider/http/**/*"
